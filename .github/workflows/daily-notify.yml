name: Daily Telegram Push

# 排程 + 手動觸發
on:
  schedule:
    # 14:13 UTC = 22:13 Asia/Taipei (台股 13:30 收盤後 8 小時 43 分,法人 22:00 公布後)
    # 週一到週五跑(週末台股不開)
    # :13 是非整點,避開 GitHub Actions 全球高峰造成的排程延遲
    - cron: "13 14 * * 1-5"
  workflow_dispatch:
    inputs:
      date:
        description: "Override target date (YYYY-MM-DD), 留空跑當日"
        required: false
        default: ""

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # 全市場 ~2360 檔 bulk + institutional ~70 檔,留充裕時間
    permissions:
      contents: write  # 給後面 commit + push snapshot CSV 用

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Lint 失敗不阻塞 push (產品 code 都通過,tests 內 E702 風格沒影響)
      - name: Lint with ruff (advisory)
        continue-on-error: true
        run: python -m ruff check src/ scripts/ app.py

      - name: Fetch top-50 daily data (price + institutional)
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python scripts/daily_fetch.py

      # 此 step 會更新 data/twse_snapshot/ CSV 並 commit
      # (continue-on-error 保證即使失敗推播仍跑;Streamlit Cloud IP 被 TWSE 擋,
      # GitHub Actions Azure IP 不被擋,所以這裡是 TWSE 資料的主要來源)
      - name: Fetch TWSE OpenAPI market data (refresh snapshot)
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python scripts/weekly_market_update.py
        continue-on-error: true

      - name: Commit snapshot CSV if changed
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/twse_snapshot/ || true
          if git diff --quiet --staged; then
            echo "No snapshot changes to commit"
          else
            git commit -m "chore(snapshot): daily TWSE market data refresh [skip ci]"
            git push
          fi

      # 預跑 default-params 全 11 strategies × 3 universe → SQLite daily_picks 表
      # + dump 成 data/twse_snapshot/daily_picks.csv 給 streamlit cloud preload。
      # 雲端 App boot 後 _run_all_strategies_cached 命中 SQLite → 0ms 回(取代
      # 每次 user 開頁重算 ~338ms~11s)。
      # continue-on-error:precompute 失敗(SQLite 沒歷史等)不該擋推播 step。
      - name: Precompute strategies (default params)
        continue-on-error: true
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python scripts/precompute_strategies.py

      - name: Commit precompute snapshot if changed
        continue-on-error: true
        run: |
          git add data/twse_snapshot/daily_picks.csv || true
          if git diff --quiet --staged; then
            echo "No daily_picks snapshot changes to commit"
          else
            git commit -m "chore(precompute): daily strategies snapshot [skip ci]"
            git push
          fi

      - name: Run daily notify
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -n "${{ inputs.date }}" ]; then
            python scripts/daily_notify.py --date "${{ inputs.date }}"
          else
            python scripts/daily_notify.py
          fi
