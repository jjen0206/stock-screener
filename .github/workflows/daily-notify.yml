name: Daily Telegram Push

# 排程 + 手動觸發
on:
  schedule:
    # 14:00 UTC = 22:00 Asia/Taipei (台股 13:30 收盤後 8.5 小時)
    # 週一到週五跑(週末台股不開)
    - cron: "0 14 * * 1-5"
  workflow_dispatch:
    inputs:
      date:
        description: "Override target date (YYYY-MM-DD), 留空跑當日"
        required: false
        default: ""

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch top-50 daily data (price + institutional)
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python scripts/daily_fetch.py

      - name: Run daily notify
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "${{ inputs.date }}" ]; then
            python scripts/daily_notify.py --date "${{ inputs.date }}"
          else
            python scripts/daily_notify.py
          fi
