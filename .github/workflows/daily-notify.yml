name: Daily Telegram Push

# 排程 + 手動觸發
on:
  schedule:
    # 14:13 UTC = 22:13 Asia/Taipei(台股 13:30 收盤後 8 小時 43 分,法人 22:00 公布後)
    # 週一到週五跑(週末台股不開)
    # :13 是非整點,避開 GitHub Actions 全球高峰造成的排程延遲
    # 主公拍板統一所有 workflow 到 22:13 — TWSE OpenAPI publication lag 期間
    # 個股可能拿不到當日資料,Step 4(get_latest_trading_date 排除 TAIEX)已 cover,
    # 推播會用個股 max(可能 = 昨日)當最新交易日。
    - cron: "13 14 * * 1-5"
  workflow_dispatch:
    inputs:
      date:
        description: "Override target date (YYYY-MM-DD), 留空跑當日"
        required: false
        default: ""

jobs:
  notify:
    runs-on: ubuntu-latest
    # 全市場 ~2360 檔 bulk + institutional ~70 檔 + daily_market_update 全市場
    # 財報 + monthly_revenue + dividend 增量(2026-05-06 主公拍板整合進來)。
    # 總時長預估 ~60-90 分(quarterly EPS ~30 + revenue/dividend ~15-30 增量),
    # 留 120 緩衝。
    timeout-minutes: 120
    permissions:
      contents: write  # 給後面 commit + push snapshot CSV 用

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Lint 失敗不阻塞 push (產品 code 都通過,tests 內 E702 風格沒影響)
      - name: Lint with ruff (advisory)
        continue-on-error: true
        run: python -m ruff check src/ scripts/ app.py

      # === Step 1: 抓今日 OHLC + 法人(快,~30 秒)===
      - name: Fetch top-50 daily data (price + institutional)
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python scripts/daily_fetch.py

      # === Step 2: 預跑策略(用今日剛抓的 OHLC,~3 分鐘)===
      # 預跑 default-params 全 16 strategies × 3 universe → SQLite daily_picks 表
      # + dump 成 data/twse_snapshot/daily_picks.csv 給 streamlit cloud preload。
      # 雲端 App boot 後 _run_all_strategies_cached 命中 SQLite → 0ms 回(取代
      # 每次 user 開頁重算 ~338ms~11s)。
      # continue-on-error:precompute 失敗(SQLite 沒歷史等)不該擋推播 step。
      - name: Precompute strategies (default params)
        continue-on-error: true
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python scripts/precompute_strategies.py

      # === Step 3: ★★ 推播 ★★(移到前面確保 push 必達)===
      # 2026-05-06 主公拍板:notify step 從尾部移到 daily_market_update 之前。
      # 原因:daily_market_update 跑全市場財報 ~15 min,若撞 120 min timeout
      # 先前的 step 全部 cancelled → 推播也沒跑。把推播移到 fetch + precompute
      # 之後 / market_update 之前,確保主公手機一定收到訊息。
      - name: Run daily notify
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -n "${{ inputs.date }}" ]; then
            python scripts/daily_notify.py --date "${{ inputs.date }}"
          else
            python scripts/daily_notify.py
          fi

      # === Step 4: 抓全市場財報 + dump 6 CSVs(~10-15 分鐘)===
      # 此 step 會更新 data/twse_snapshot/ CSV 並由下一 step commit
      # (continue-on-error 保證即使失敗推播 / precompute 仍已跑;Streamlit
      # Cloud IP 被 TWSE 擋,GitHub Actions Azure IP 不被擋,所以這裡是 TWSE
      # 資料的主要來源)
      # 2026-05-06 主公拍板拆 monthly_revenue + dividend 出去(改 weekly
      # backfill 跑),此 step 從 2h+ → ~15 min。
      - name: Fetch TWSE OpenAPI market data (refresh snapshot)
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python scripts/daily_market_update.py
        continue-on-error: true

      # === Step 5: Commit 全部 snapshot 改動(daily_picks + market_update 一起)===
      - name: Commit snapshot CSV if changed
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/twse_snapshot/ || true
          if git diff --quiet --staged; then
            echo "No snapshot changes to commit"
          else
            git commit -m "chore(snapshot): daily TWSE market data refresh [skip ci]"
            git push
          fi

      # === Step 6: 歷史回測勝率(只週一跑)===
      # 跑 default params 全 16 strategies 過去 126 個交易日,寫進
      # strategy_backtest 表 + dump CSV。週二~五 skip 避免每天浪費 CI 時間。
      # cron 14:13 UTC,週一在 UTC 也是週一(date -u +%w == "1")。
      # continue-on-error:回測失敗不擋整體 workflow。
      - name: Backtest strategies (Mondays only)
        continue-on-error: true
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: |
          DOW=$(date -u +%w)
          if [ "$DOW" = "1" ]; then
            echo "Monday — running backtest (lookback 126 trading days)"
            python scripts/backtest_strategies.py --lookback 126
          else
            echo "Skip backtest (DOW=$DOW, only runs on Monday=1)"
          fi

      - name: Commit backtest snapshot if changed
        continue-on-error: true
        run: |
          git add data/twse_snapshot/strategy_backtest.csv 2>/dev/null || true
          if git diff --quiet --staged; then
            echo "No strategy_backtest snapshot changes to commit"
          else
            git commit -m "chore(backtest): weekly strategies backtest snapshot [skip ci]"
            git push
          fi
