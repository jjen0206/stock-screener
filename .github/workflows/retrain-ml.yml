name: ML Retrain (manual emergency, random-split gate)

# 2026-05-16 改 manual-only:本 workflow 跟 ml-weekly-retrain.yml 訓同一組 model
# (short_pick + per_strategy),差別只在 gate 策略 —
#   - ml-weekly-retrain.yml(週日 03:00 TPE):walk-forward A/B gate(嚴格 OOS)
#   - 本 workflow:random-split accuracy gate(寬鬆,backward-compat)
# 兩個都排 cron 時,週日 22:13 這條會直接覆蓋掉早上 03:00 嚴格 gate 過的版本。
# 故本 workflow 改成 workflow_dispatch only,保留為「緊急手動 retrain」工具
# (改完 features 想立刻 retrain / 嚴格 gate 出問題想換寬鬆驗證等)。
#
# 詳細紀錄:docs/workflow-audit-2026-05-15.md Candidate #1 段落。
on:
  workflow_dispatch:  # 手動觸發,給主公急用 / 改完 features 想立刻重訓
    inputs:
      force_commit:
        description: "強制 commit(略過 accuracy 退化檢查)"
        type: boolean
        default: false

# 防雙觸發 race(cron + manual dispatch 同時 / 連按兩下 manual 等)。
# cancel-in-progress: false → 後一個排隊等,不 cancel 進行中的(model push
# 順序重要,不能讓晚的覆蓋早的成功 commit)。
concurrency:
  group: retrain-ml
  cancel-in-progress: false

jobs:
  retrain:
    runs-on: ubuntu-latest
    # 通用 ~2 分鐘 + per-strategy 8-10 分鐘(11 strategies × 200d gather)+ preload + 緩衝
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: 讀舊模型 metrics(給退化檢查用)
        run: |
          python <<'PYEOF'
          import json, os
          from pathlib import Path
          meta_path = Path('models/short_pick.meta.json')
          if meta_path.exists():
              m = json.load(open(meta_path))
              old_acc = m['metrics']['accuracy']
              print(f'[RETRAIN] 舊模型 accuracy={old_acc:.4f}')
          else:
              old_acc = 0.0
              print('[RETRAIN] 沒有舊模型 meta,首次訓練')
          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f'OLD_ACCURACY={old_acc}\n')
          PYEOF

      - name: 訓練通用模型(生 short_pick.pkl + meta.json)
        run: python scripts/train_ml_model.py

      - name: 訓練 per-strategy 模型(11 個 strategies × 200 day lookback)
        # 全 11 fallback 才 exit 1(SQLite 歷史空才會發生);讓 workflow 繼續
        # 跑通用 model commit,確保至少通用模型有更新。
        continue-on-error: true
        run: python scripts/train_per_strategy_ml.py --lookback 200

      - name: 退化檢查 + 決定是否 commit
        env:
          FORCE_COMMIT: ${{ github.event.inputs.force_commit }}
        run: |
          python <<'PYEOF'
          import json, os
          from pathlib import Path
          new_meta = json.load(open('models/short_pick.meta.json'))
          new_acc = new_meta['metrics']['accuracy']
          old_acc = float(os.environ.get('OLD_ACCURACY', '0'))
          delta = new_acc - old_acc
          force = os.environ.get('FORCE_COMMIT', 'false') == 'true'
          # 退化 > 5pp 且非 force → reject
          reject = (not force) and delta < -0.05
          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f'NEW_ACCURACY={new_acc}\n')
              f.write(f'DELTA={delta}\n')
              f.write(f'REJECT_COMMIT={"1" if reject else "0"}\n')
          print(
              f'[RETRAIN] new={new_acc:.4f} old={old_acc:.4f} '
              f'delta={delta:+.4f} ({delta*100:+.1f}pp) force={force} '
              f'reject={reject}'
          )
          if reject:
              print(
                  f'::warning::Accuracy 退化 {delta*100:+.1f}pp (>5pp),'
                  '拒絕 commit。手動觸發勾 force_commit 才會推。'
              )
          PYEOF

      - name: Commit & push 新模型(沒退化才走這條)
        if: env.REJECT_COMMIT == '0'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add models/short_pick.pkl models/short_pick.meta.json models/per_strategy/
          if git diff --staged --quiet; then
            echo "[RETRAIN] 模型內容無變(訓練 random_state 鎖死且資料沒變),不 commit"
            exit 0
          fi
          # python 算 pp 顯示(bash 浮點不準)
          DELTA_PP=$(python -c "print(f'{float(\"${DELTA}\") * 100:+.1f}')")
          # 多行 commit message 用 git commit -F - + heredoc(yaml block scalar
          # 內,所有行縮排對齊到 yaml block indent 即可,bash strip 後 heredoc
          # terminator MSGEND 落在 line 開頭符合 bash 規則)
          git commit -F - <<MSGEND
          chore(ml): weekly auto-retrain (accuracy ${OLD_ACCURACY} → ${NEW_ACCURACY}, ${DELTA_PP}pp)

          Auto-generated by .github/workflows/retrain-ml.yml.
          通用模型 + per-strategy 模型(Stage 2B)同時重訓。

          Old general accuracy: ${OLD_ACCURACY}
          New general accuracy: ${NEW_ACCURACY}
          Delta:                ${DELTA_PP}pp
          Per-strategy models:  models/per_strategy/*.pkl + .meta.json
          Run ID:               ${{ github.run_id }}
          MSGEND
          # rebase + retry 避免跟 daily snapshot 撞 push
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main || {
              echo "[RETRAIN] rebase failed, abort"
              git rebase --abort || true
              exit 1
            }
            if git push origin HEAD:main; then
              echo "[RETRAIN] push OK (attempt $i)"
              exit 0
            fi
            echo "[RETRAIN] push rejected (attempt $i), retry"
            sleep $((i * 5))
          done
          echo "::error::push 失敗 5 次,放棄"
          exit 1

      - name: 退化拒絕(REJECT_COMMIT=1 走這條)
        if: env.REJECT_COMMIT == '1'
        run: |
          echo "::error::模型 accuracy 退化 >5pp,本次不 commit。"
          echo "舊 accuracy: $OLD_ACCURACY"
          echo "新 accuracy: $NEW_ACCURACY"
          echo "Delta:       $DELTA"
          echo "如要強制覆蓋:Actions → Weekly ML Retrain → Run workflow → 勾 force_commit"
          exit 1
