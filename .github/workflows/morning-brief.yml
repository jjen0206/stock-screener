name: Morning Brief (pre-market)

# 盤前快訊:每交易日 08:30 Asia/Taipei 推播
#
# 觸發架構 (2026-05-19 主公拍板,逃離 GHA schedule 不可靠):
#   主班 = cron-job.org 外部 cron → GitHub dispatches API trigger workflow_dispatch
#          時間 08:30 TW (00:30 UTC) — SLA 99.99% 不會被 drop
#   GHA 第二層 fallback (萬一 cron-job.org 掛了還有保底):
#     - 07:47 TW (23:47 UTC -1d, 週日-週四) = 提早 43 min
#     - 08:17 TW (00:17 UTC 週一-週五) = 提早 13 min
#   兩條 GHA cron 預期常被 delay (這就是當初出事的原因), delay 到 08:30 後
#   被下方 dedup step 認出「8h 內已有 success run」直接 skip,不會雙推。
#
# 詳細 setup SOP:docs/external-cron-morning-brief-setup.md
#
# 目的:主公開盤前 30 分鐘掌握隔夜變動(警示更新 / 重大 news / 推薦變動 / 美股情緒),
# 不重複推昨晚 22:13 那一輪 — 只推「變動 + 重要警示」,無變動推極簡訊。
#
# Kill-switch:MORNING_BRIEF_ENABLED=false → script 自己 exit 0 不推。

on:
  schedule:
    # === GHA 第二層 fallback (僅在 cron-job.org 整個失效時才有用) ===
    # 07:47 TW (23:47 UTC -1d, 週日-週四 UTC = 週一-週五 TW)
    - cron: "47 23 * * 0-4"
    # 08:17 TW (00:17 UTC 週一-週五 UTC = 週一-週五 TW)
    - cron: "17 0 * * 1-5"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "dry-run(不真送,只 print)"
        type: boolean
        default: false
      date:
        description: "覆寫比對基準日 YYYY-MM-DD(留空走 daily_prices MAX(date))"
        required: false
        default: ""
      triggered_by:
        description: "觸發來源 tag(方便看 log 追溯,e.g. external-cron-job-org / manual / health-monitor)"
        required: false
        default: "manual"

# 同 group 同時最多 1 個,避免兩輪 cron 重疊
concurrency:
  group: morning-brief
  cancel-in-progress: false

jobs:
  # ============================================================================
  # Job 1: dedup — 查最近 8h 有沒有成功的 morning-brief run, 有就 skip
  # ============================================================================
  # 為何 8h:cron-job.org 08:30 + GHA fallback 07:47 / 08:17 全在 1 小時內,8h
  # 窗口足以 cover「主班已成功 → fallback 延遲 fire 想雙推」的場景。
  # 主公手動 EXECUTE NOW 或下 GH UI workflow_dispatch 不會被 skip(因為手動觸發
  # 通常是 debug / 重跑, 主公自己知道在做什麼)。
  dedup:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      should_skip: ${{ steps.check.outputs.should_skip }}
    steps:
      - name: Check recent successful runs (8h window)
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            // 手動觸發永遠不 skip — 主公自己按的, 一定有原因
            if (context.eventName === 'workflow_dispatch') {
              core.info('Manual workflow_dispatch — skip dedup check');
              core.setOutput('should_skip', 'false');
              return;
            }
            const eightHoursAgoMs = Date.now() - 8 * 3600 * 1000;
            const eightHoursAgoIso = new Date(eightHoursAgoMs).toISOString();
            const { data } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'morning-brief.yml',
              status: 'success',
              created: `>${eightHoursAgoIso}`,
              per_page: 10,
            });
            const recent = data.workflow_runs.filter(r => r.id !== context.runId);
            if (recent.length > 0) {
              const ids = recent.map(r => `${r.id} (${r.created_at})`).join(', ');
              core.info(`Skip: found ${recent.length} success run(s) in last 8h: ${ids}`);
              core.setOutput('should_skip', 'true');
            } else {
              core.info('No recent success runs — proceed');
              core.setOutput('should_skip', 'false');
            }

  # ============================================================================
  # Job 2: brief — 真正跑盤前快訊
  # ============================================================================
  brief:
    needs: dedup
    if: needs.dedup.outputs.should_skip != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15  # refetch warnings ~30s + news ~5s + yfinance ~5s + 推播 ~3s

    steps:
      - name: Log trigger source
        run: |
          echo "[MORNING_BRIEF] event=${{ github.event_name }} triggered_by=${{ inputs.triggered_by || 'schedule' }}"

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # 雲端 runner 是 fresh container — preload data/twse_snapshot/ CSV 進 SQLite
      # 確保 compute_top_picks(走 _select_top_picks) 有 daily_prices / daily_picks
      # 歷史可比對,否則 yesterday_picks 永遠空,diff 永遠是「沒變動」失去意義。
      - name: Preload snapshots into SQLite
        run: |
          python -c "
          from src import database as db
          db.init_db()
          counts = db.preload_snapshots()
          print(f'[MORNING_BRIEF] preload snapshots: {counts}')
          "

      - name: Run morning brief
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          MORNING_BRIEF_ENABLED: "true"
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "${{ inputs.date }}" ]; then
            ARGS="$ARGS --date ${{ inputs.date }}"
          fi
          echo "Running: python scripts/morning_brief.py $ARGS"
          python scripts/morning_brief.py $ARGS
