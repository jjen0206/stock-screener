name: Morning Brief (pre-market)

# 盤前快訊:每交易日 08:30 Asia/Taipei 推播
#
# 觸發架構 (2026-05-19 升級, 主公拍板逃離 GHA schedule 不可靠):
#   主班 = cron-job.org 外部 cron → GitHub dispatches API (workflow_dispatch)
#          時間 08:30 TW (00:30 UTC) — SLA 99.99% 不會被 drop
#   GHA fallback (萬一 cron-job.org 掛了 / token 過期):
#     - 07:47 TW (23:47 UTC -1d) — 提早 43 min
#     - 08:17 TW (00:17 UTC) — 提早 13 min
#   兩條 GHA cron off-boundary 已比 :00/:30 抗壅塞 (2026-05-18 修),但仍是
#   best-effort, 真正穩定靠 cron-job.org。
#   dedup step (下方) 8h 窗口確保多源觸發不雙推。
#   health monitor: morning-brief-health-monitor.yml 09:30 TW 查 24h 內無
#   success 就推 Telegram 警告主公手動 trigger。
#
# 詳細 setup SOP:docs/external-cron-morning-brief-setup.md
#
# 歷史背景 (為何當初逃離 GHA schedule):
#   2026-05-18 主公盤前快訊延遲 4h 18min — GHA 把 00:30 UTC 延到 04:48 UTC。
#   2026-05-19 主班 + safety net 雙班全 drop, 延 1h 43min — 確認 GHA schedule
#   即使 off-boundary 仍不可靠, 改 cron-job.org 外部觸發。
#
# Kill-switch:MORNING_BRIEF_ENABLED=false → script 自己 exit 0 不推。

on:
  schedule:
    # 主班 — 07:47 TW(off-boundary 避開 GHA cron 壅塞 :00 / :30)
    # cron weekday 0-4 = UTC 週日到週四,加 8h 後 = TW 週一到週五
    - cron: "47 23 * * 0-4"
    # 補班 — 08:17 TW (主班 +30min),safety net for GHA cron drop
    # weekday 1-5 = UTC 週一到週五,加 8h = TW 週一到週五同一天
    - cron: "17 0 * * 1-5"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "dry-run(不真送,只 print)"
        type: boolean
        default: false
      date:
        description: "覆寫比對基準日 YYYY-MM-DD(留空走 daily_prices MAX(date))"
        required: false
        default: ""
      triggered_by:
        description: "觸發來源 tag(方便看 log 追溯, e.g. external-cron-job-org / manual / health-monitor)"
        required: false
        default: "manual"

# 同 group 同時最多 1 個 — 主班還在跑時補班 queue 等待,完成後補班的 dedup
# step 會偵測「已成功推過」 → skip,確保只推一次
concurrency:
  group: morning-brief
  cancel-in-progress: false

# actions:read 給 dedup step 跑 gh api 撈 workflow runs
permissions:
  contents: read
  actions: read

jobs:
  brief:
    runs-on: ubuntu-latest
    timeout-minutes: 15  # refetch warnings ~30s + news ~5s + yfinance ~5s + 推播 ~3s
    permissions:
      contents: write  # 收尾 heartbeat step 要 commit + push sync_log_heartbeat.csv

    steps:
      - name: Log trigger source
        run: |
          echo "[MORNING_BRIEF] event=${{ github.event_name }} triggered_by=${{ inputs.triggered_by || 'schedule' }} run_id=${{ github.run_id }}"

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0  # heartbeat commit + rebase 需完整歷史

      # Dedup — schedule trigger 才檢查,workflow_dispatch 永遠跑(主公手動補推用)
      # 8h 窗口可同時 cover 主班(23:47 UTC) + 補班(00:17 UTC)
      # 主班正常完成 → 補班看到 prior success → skip
      # 主班 GHA drop / fail → 補班看不到 prior success → 接著推
      - name: Skip if already pushed in past 8h
        id: dedup
        if: github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cutoff=$(date -u -d '8 hours ago' +%Y-%m-%dT%H:%M:%SZ)
          self_id="${{ github.run_id }}"
          repo="${{ github.repository }}"
          prior=$(gh api \
            "/repos/$repo/actions/workflows/morning-brief.yml/runs?per_page=20&status=success" \
            --jq ".workflow_runs[] | select(.id != $self_id) | select(.created_at > \"$cutoff\") | .id" \
            | wc -l)
          if [ "$prior" -gt 0 ]; then
            echo "[MORNING_BRIEF] $prior prior successful run(s) since $cutoff — skip"
            echo "skip=1" >> "$GITHUB_OUTPUT"
          else
            echo "[MORNING_BRIEF] no prior successful run in past 8h — proceed"
            echo "skip=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Python 3.11
        if: steps.dedup.outputs.skip != '1'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        if: steps.dedup.outputs.skip != '1'
        run: pip install -r requirements.txt

      # 雲端 runner 是 fresh container — preload data/twse_snapshot/ CSV 進 SQLite
      # 確保 compute_top_picks(走 _select_top_picks) 有 daily_prices / daily_picks
      # 歷史可比對,否則 yesterday_picks 永遠空,diff 永遠是「沒變動」失去意義。
      - name: Preload snapshots into SQLite
        if: steps.dedup.outputs.skip != '1'
        run: |
          python -c "
          from src import database as db
          db.init_db()
          counts = db.preload_snapshots()
          print(f'[MORNING_BRIEF] preload snapshots: {counts}')
          "

      - name: Run morning brief
        if: steps.dedup.outputs.skip != '1'
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          MORNING_BRIEF_ENABLED: "true"
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "${{ inputs.date }}" ]; then
            ARGS="$ARGS --date ${{ inputs.date }}"
          fi
          echo "Running: python scripts/morning_brief.py $ARGS"
          python scripts/morning_brief.py $ARGS

      # cron heartbeat — interval=24h(每交易日 08:30 一次)
      - name: Record cron heartbeat
        if: always()
        continue-on-error: true
        run: bash scripts/heartbeat_step.sh morning_brief 24 ${{ job.status }}
