name: Backfill Financials (one-shot manual)

# 補 financials 表(quarterly EPS / ROE)缺漏的全市場資料。
#
# 2026-05-16 健診:financials 只覆蓋 1073 / 2127 純股(~50%),長線基本面策略
# 在沒財報的 1054 檔上跑不了。
#
# 觸發模式:
#   - workflow_dispatch:手動跑一次(GH UI > Actions > Run workflow)
#   - schedule(*/30 * * * *):2026-05-19 P2-4a 加,每 30 分鐘自動串接下一批 200 檔
#     直到 pure_stock universe coverage >= 99%。背景:script `--max-stocks=200`
#     單次跑 200 檔,搭配 skip 已有 sid → 每次自然挑下一批,~10 個 cron fire
#     ≈ 5 小時跑完全市場 2060 檔,主公無感。FinMind quota 1500/hr 安全,
#     ~400 calls/hr rolling window。
#   - Coverage guard:cron fire 時若 financials ∩ pure_stock universe >= 99%
#     會跳過 backfill / dump / release / commit 等重活,~2-3 分鐘 noop 結束。
#     全部跑完後可手動移除 schedule 區塊(也可以留著,反正 noop)。
#
# 預估 runtime:單批 ~200 檔 × FinMind throttle ~0.5s/檔 + sleep = 5-10 min(原本
# 30-60 min 估計是全 2000 檔單次跑;P2-4a 改 200/批以後單批快很多)。
#
# Storage 策略(2026-05-17 改):
#   - 全市場 financials.quarterly ~30MB CSV / ~5MB parquet
#   - 預設 parquet 上傳到 GH Release(snapshot-financials-YYYY-MM-DD),根治
#     未來資料量增長撞 100MB
#   - 既有 CSV 路徑保留作為向後相容 fallback

on:
  workflow_dispatch:
    inputs:
      years:
        description: "抓近幾年季報(預設 5;swing 基本面 toggle 需要 ROE 5 年)"
        required: false
        default: "5"
      force:
        description: "強制重抓(忽略 financials 已有的 sid)"
        required: false
        default: "false"
      limit:
        description: "只跑前 N 檔(debug 用,留空 = 全跑)"
        required: false
        default: ""
      sleep:
        description: "每檔 sleep 秒數(預設 0.5,FinMind 友善)"
        required: false
        default: "0.5"
      dump_format:
        description: "Dump 格式: parquet(預設,給 release) / csv(向後相容)"
        required: false
        default: "parquet"
      upload_release:
        description: "Dump 完上傳到 GH Release(預設 true)"
        required: false
        default: "true"
  # Schedule disabled 2026-05-19: FinMind 月配額爆 (status 402),第二批就掛 →
  # 後續 cron fire 跑 noop 浪費 GHA runner 月 2000 min 配額。改 alert-based
  # manual trigger:scripts/alert_quota_reset.py 每月 1 號 09:00 台北推 Telegram
  # +Discord 提醒,主公收到後手動 dispatch 跑下一批。
  # 重啟方法:移除這段註解,恢復 `schedule: - cron: "*/30 * * * *"` 即可。
  # (或先用 GH UI Actions > Backfill Financials > Run workflow 手動跑。)

concurrency:
  group: backfill-financials
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Init universe + preload financials snapshot
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/daily_fetch.py || true
          python -c "
          from src import database as db
          db.init_db()
          n = db.preload_snapshots()
          print(f'[PRELOAD] {n}')
          "

      - name: Coverage guard — skip heavy work if already complete
        id: cov
        # 計 financials ∩ pure_stock universe coverage,>=99% 就讓後續 step 全跳過。
        # 給 cron 模式用:全跑完後 cron 還會持續 fire,有 guard 才不會浪費 runner 跑 backfill / dump / release。
        run: |
          python <<'PY'
          import os
          from src import database as db
          from src.universe import pure_stock_universe
          from scripts.backfill_financials import stocks_with_financials
          db.init_db()
          universe = set(pure_stock_universe(min_history=20))
          have = stocks_with_financials() & universe
          coverage = (len(have) / len(universe)) if universe else 1.0
          print(f"[GUARD] coverage={coverage:.1%} ({len(have)}/{len(universe)})")
          skip = "true" if coverage >= 0.99 else "false"
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"skip={skip}\n")
              f.write(f"coverage={coverage:.4f}\n")
              f.write(f"have={len(have)}\n")
              f.write(f"universe={len(universe)}\n")
          PY

      - name: Run financials backfill
        if: steps.cov.outputs.skip != 'true'
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          FINMIND_LONG_BACKOFF: "1"
        run: |
          ARGS="--years ${{ inputs.years || '5' }}"
          ARGS="$ARGS --sleep ${{ inputs.sleep || '0.5' }}"
          if [ "${{ inputs.force }}" = "true" ]; then ARGS="$ARGS --force"; fi
          if [ -n "${{ inputs.limit }}" ]; then ARGS="$ARGS --limit ${{ inputs.limit }}"; fi
          ARGS="$ARGS --dump-format ${{ inputs.dump_format || 'parquet' }}"
          echo "Running: python scripts/backfill_financials.py $ARGS"
          python scripts/backfill_financials.py $ARGS

      - name: Verify backfilled rows
        if: steps.cov.outputs.skip != 'true'
        run: |
          python -c "
          from src import database as db
          db.init_db()
          with db.get_conn() as c:
              row = c.execute(\"\"\"SELECT
                  COUNT(*),
                  COUNT(DISTINCT stock_id),
                  MIN(period), MAX(period)
                  FROM financials WHERE period_type='quarterly'\"\"\").fetchone()
              print(f'[VERIFY] financials.quarterly: {row[0]} rows / {row[1]} 不同 stock_id / 範圍 {row[2]} ~ {row[3]}')
          "

      - name: Upload snapshot to GitHub Release
        if: steps.cov.outputs.skip != 'true' && (inputs.upload_release || 'true') == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FMT="${{ inputs.dump_format || 'parquet' }}"
          if [ "$FMT" = "parquet" ]; then
            FILE="data/twse_snapshot/financials_quarterly.parquet"
          else
            FILE="data/twse_snapshot/financials_quarterly.csv"
          fi
          if [ ! -f "$FILE" ]; then
            echo "[RELEASE] $FILE 不存在,skip upload"
            exit 0
          fi
          TAG="snapshot-financials-$(date +%Y-%m-%d)"
          NOTES="Backfill financials.quarterly $(stat -c%s "$FILE") bytes"
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "[RELEASE] tag $TAG 已存在,直接 upload --clobber"
          else
            gh release create "$TAG" \
              --repo "${{ github.repository }}" \
              --title "$TAG" \
              --notes "$NOTES"
          fi
          gh release upload "$TAG" "$FILE" \
            --repo "${{ github.repository }}" \
            --clobber
          python -c "
          from pathlib import Path
          from src import snapshot_release as sr
          f = Path('$FILE')
          sr.update_release_cache(
              snapshot_dir='data/twse_snapshot',
              tag='$TAG',
              assets=[{'name': f.name, 'size': f.stat().st_size, 'sha256': sr.compute_sha256(f)}],
              notes='financials backfill',
          )
          "
          echo "[RELEASE] uploaded $FILE to $TAG"

      - name: Commit .snapshot_releases.json (manifest only — parquet 不入 git)
        if: steps.cov.outputs.skip != 'true' && (inputs.upload_release || 'true') == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/twse_snapshot/.snapshot_releases.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "[COMMIT] no manifest changes"
            exit 0
          fi
          git commit -m "chore(snapshot): update financials release manifest [skip ci]"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main || {
              git rebase --abort || true
              exit 1
            }
            if git push origin HEAD:main; then
              echo "[COMMIT] push OK on attempt $i"
              exit 0
            fi
            sleep $((i * 5))
          done
          exit 1

      - name: Upload backfill log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backfill-financials-log
          path: logs/*-backfill_financials.log
          retention-days: 14
