name: Intraday Trigger Alerts (30-min)

# 每 30 分鐘掃 active paper_trades,觸發停損 / 進場 / 突破壓力 → Telegram + Discord。
# 同 sid 同 alert_type 同日 dedup(alert_dedup 表)避免反覆推。
#
# Cron 排期:*/30 * * * 1-5(週一至週五每 30 分鐘掃)
#   GitHub Actions cron 用 UTC,涵蓋台股盤中(01:00-05:30 UTC = 09:00-13:30 TPE)
#   盤外時段 active paper_trades 也可能因 yfinance pre-market 觸發 — dedup
#   會擋反覆推。無 active trade 時 script 早退 0 成本。
#
# scripts/intraday_alerts.py 內部會 preload_snapshots 撐 SQLite 看到 paper_trades

on:
  schedule:
    # 週一至週五每 30 分鐘
    - cron: "*/30 * * * 1-5"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "dry-run(不真送)"
        type: boolean
        default: false
      no_intraday:
        description: "不打 yfinance,用 daily_prices 最新 close 當現價(debug 用)"
        type: boolean
        default: false

concurrency:
  group: intraday-alerts
  cancel-in-progress: false

jobs:
  scan-and-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write  # 收尾 heartbeat step 要 commit + push sync_log_heartbeat.csv

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0  # heartbeat commit + rebase 需完整歷史

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run intraday alerts scan
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ "${{ inputs.no_intraday }}" = "true" ]; then
            ARGS="$ARGS --no-intraday"
          fi
          echo "Running: python scripts/intraday_alerts.py $ARGS"
          python scripts/intraday_alerts.py $ARGS

      # cron heartbeat — interval=0.5h(weekdays */30)
      # 48 次/天 commit 是已知 trade-off,主公決定接受(spec)。stale threshold = 1h。
      - name: Record cron heartbeat
        if: always()
        continue-on-error: true
        run: bash scripts/heartbeat_step.sh intraday_alerts 0.5 ${{ job.status }}
