name: Stock Warnings Fetch

# 抓 TWSE / TPEx 警示股紀錄(違約交割 / 注意 / 處置 / 全額交割 / 變更交易方法)
# - cron: "13 9 * * 1-5" → UTC 09:13 = 台灣時間 17:13(每個交易日收盤後 30 分鐘)
#   TWSE 收盤 13:30,公告通常 14:00-16:00 出齊;17:13 抓給足夠 buffer
# - 主公拍板:獨立 workflow,跟 daily-fetch / weekly-shareholder-fetch 並列
on:
  schedule:
    - cron: "13 9 * * 1-5"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write  # commit data/twse_snapshot/*.csv

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch TWSE/TPEx stock warnings
        run: python scripts/fetch_stock_warnings.py

      # 把 SQLite stock_warnings + default_settlement_daily 兩張表 dump 成 CSV 進 repo。
      # data/cache.db 被 .gitignore (`data/*.db`),雲端 Streamlit 看不到 → 必須走
      # snapshot CSV 路徑(類似 news-notify.yml dump news.csv 進 data/twse_snapshot/)。
      # preload_snapshots() 在 streamlit boot + GH Actions runner 都會讀這兩個 CSV。
      - name: Dump stock_warnings + default_settlement_daily snapshots
        continue-on-error: true
        run: |
          python -c "
          import pandas as pd
          from pathlib import Path
          from src import database as db
          db.init_db()
          out_dir = Path('data/twse_snapshot')
          out_dir.mkdir(parents=True, exist_ok=True)
          with db.get_conn() as conn:
              df_w = pd.read_sql(
                  'SELECT stock_id, warning_type, announced_date, effective_from, '
                  'effective_to, reason, source_url, fetched_at FROM stock_warnings '
                  'ORDER BY announced_date DESC, stock_id, warning_type',
                  conn,
              )
              df_d = pd.read_sql(
                  'SELECT market, report_date, gross_amount, net_amount, '
                  'source_url, fetched_at FROM default_settlement_daily '
                  'ORDER BY report_date DESC, market',
                  conn,
              )
          df_w.to_csv(out_dir / 'stock_warnings.csv', index=False)
          df_d.to_csv(out_dir / 'default_settlement_daily.csv', index=False)
          print(f'wrote stock_warnings.csv: {len(df_w)} rows')
          print(f'wrote default_settlement_daily.csv: {len(df_d)} rows')
          "

      # push race retry:跟 weekly-shareholder-fetch / daily-fetch / news-notify 同 pattern,
      # 跨 workflow 同時段推 main 用 rebase + retry 5 次避免 [rejected]。
      - name: Commit & push snapshot CSVs if changed
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/twse_snapshot/stock_warnings.csv \
                  data/twse_snapshot/default_settlement_daily.csv 2>/dev/null || true
          if git diff --quiet --staged; then
            echo "[WARNINGS] no snapshot changes to commit"
            exit 0
          fi
          git commit -m "chore(warnings): TWSE/TPEx stock warnings snapshot [skip ci]"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main || true
            if git push origin HEAD:main; then
              echo "[WARNINGS] push OK (attempt $i)"
              exit 0
            fi
            sleep $((i * 5))
          done
          echo "::warning::stock_warnings push 失敗 5 次"
