name: Backfill Institutional (one-shot manual)

# 補 institutional 表 2024-01-02 ~ 2025-11-03 的 22 個月歷史(法人籌碼 long backtest 用)。
#
# 這支 workflow 是「**一次性**」用的 — 跑完 22 月就不該再觸發,所以不放 cron。
# 想再跑的時候到 GH UI > Actions > Backfill Institutional > Run workflow,
# 改 start/end 補其他區間。
#
# 完整 22 月: ~440 工作日 × 2 endpoints × (HTTP + sleep) ≈ 30-60 min。
# 給 GH runner 120 min 上限應該綽綽有餘。
#
# Storage 策略(2026-05-17 改):
#   - 22 月 institutional ~150MB,直接 commit 進 git push 會撞 100MB 上限
#   - **改 dump parquet + 上傳 GH Release**(snapshot-institutional-YYYY-MM-DD),
#     不污染 git history、零成本、versioned 天然
#   - Cloud `src.database.preload_snapshots` 啟動時若本地缺 parquet → 自動從 latest
#     release 拉 → load 進 SQLite
#   - 既有 CSV 路徑仍保留,當作向後相容 fallback

on:
  workflow_dispatch:
    inputs:
      start:
        description: "起始日 (ISO,含)"
        required: false
        default: "2024-01-02"
      end:
        description: "終止日 (ISO,含)"
        required: false
        default: "2025-11-03"
      sleep:
        description: "每個日期間 sleep 秒數 (預設 2.5,別調太低會被 ban)"
        required: false
        default: "2.5"
      dump_format:
        description: "Dump 格式: parquet(預設,給 release) / csv(向後相容,小型 backfill)"
        required: false
        default: "parquet"
      upload_release:
        description: "Dump 完上傳到 GH Release(預設 true)"
        required: false
        default: "true"

concurrency:
  group: backfill-institutional
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Preload existing institutional snapshot → SQLite (skip already-fetched dates)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python -c "
          import pandas as pd
          from pathlib import Path
          from src import database as db
          from src import snapshot_release as sr
          db.init_db()
          # 先試從 GH Release 拉最新 parquet(若有)
          tag = sr.get_latest_snapshot_tag('snapshot-institutional-')
          if tag:
              p = sr.download_snapshot_from_release(
                  tag, 'institutional.parquet',
                  dest=Path('data/twse_snapshot'),
                  snapshot_dir=Path('data/twse_snapshot'),
              )
              if p and p.exists():
                  df = pd.read_parquet(p)
                  df['stock_id'] = df['stock_id'].astype(str)
                  records = df.to_dict('records')
                  db.upsert_institutional(records)
                  print(f'[PRELOAD] {len(records)} rows from release {tag}')
          # 向後相容:CSV 也載入
          p = Path('data/twse_snapshot/institutional.csv')
          if p.exists():
              df = pd.read_csv(p, dtype={'stock_id': str})
              if not df.empty:
                  records = df.to_dict('records')
                  for r in records:
                      for k, v in list(r.items()):
                          if pd.isna(v): r[k] = None
                  db.upsert_institutional(records)
                  print(f'[PRELOAD] {len(records)} rows from CSV')
          "

      - name: Run backfill (TWSE + TPEx, FinMind fallback)
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: |
          python scripts/backfill_institutional.py \
            --start "${{ inputs.start }}" \
            --end "${{ inputs.end }}" \
            --sleep "${{ inputs.sleep }}" \
            --max-retries 3 \
            --progress-every 25 \
            --dump-format "${{ inputs.dump_format }}"

      - name: Verify backfilled rows
        run: |
          python -c "
          from src import database as db
          db.init_db()
          with db.get_conn() as c:
              n = c.execute('SELECT COUNT(*) FROM institutional WHERE date BETWEEN ? AND ?', ('${{ inputs.start }}', '${{ inputs.end }}')).fetchone()[0]
              days = c.execute('SELECT COUNT(DISTINCT date) FROM institutional WHERE date BETWEEN ? AND ?', ('${{ inputs.start }}', '${{ inputs.end }}')).fetchone()[0]
              print(f'[VERIFY] {n} rows across {days} unique dates in [${{ inputs.start }}, ${{ inputs.end }}]')
              row = c.execute('SELECT MIN(date), MAX(date) FROM institutional').fetchone()
              print(f'[VERIFY] institutional 覆蓋區間: {row[0]} ~ {row[1]}')
          "

      - name: Upload snapshot to GitHub Release
        if: inputs.upload_release == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FMT="${{ inputs.dump_format }}"
          if [ "$FMT" = "parquet" ]; then
            FILE="data/twse_snapshot/institutional.parquet"
          else
            FILE="data/twse_snapshot/institutional.csv"
          fi
          if [ ! -f "$FILE" ]; then
            echo "[RELEASE] $FILE 不存在,skip upload"
            exit 0
          fi
          TAG="snapshot-institutional-$(date +%Y-%m-%d)"
          NOTES="Backfill institutional ${{ inputs.start }} ~ ${{ inputs.end }} ($(stat -c%s "$FILE") bytes)"
          # 用 gh CLI(GH Actions runner 預裝)
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "[RELEASE] tag $TAG 已存在,直接 upload --clobber"
          else
            gh release create "$TAG" \
              --repo "${{ github.repository }}" \
              --title "$TAG" \
              --notes "$NOTES"
          fi
          gh release upload "$TAG" "$FILE" \
            --repo "${{ github.repository }}" \
            --clobber
          # 也把 .snapshot_releases.json cache 寫進去 commit(讓雲端 boot 知道 SHA)
          python -c "
          from pathlib import Path
          from src import snapshot_release as sr
          f = Path('$FILE')
          sr.update_release_cache(
              snapshot_dir='data/twse_snapshot',
              tag='$TAG',
              assets=[{'name': f.name, 'size': f.stat().st_size, 'sha256': sr.compute_sha256(f)}],
              notes='${{ inputs.start }} ~ ${{ inputs.end }}',
          )
          "
          echo "[RELEASE] uploaded $FILE to $TAG"

      - name: Commit .snapshot_releases.json (manifest only — parquet 不入 git)
        if: inputs.upload_release == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/twse_snapshot/.snapshot_releases.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "[COMMIT] no manifest changes"
            exit 0
          fi
          git commit -m "chore(snapshot): update institutional release manifest [skip ci]"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main || {
              git rebase --abort || true
              exit 1
            }
            if git push origin HEAD:main; then
              echo "[COMMIT] push OK on attempt $i"
              exit 0
            fi
            sleep $((i * 5))
          done
          exit 1

      - name: Upload backfill log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backfill-institutional-log
          path: logs/*-backfill_institutional.log
          retention-days: 14
