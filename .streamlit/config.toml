# Streamlit 伺服器與主題設定(本機 + Streamlit Cloud 共用)

[server]
headless = true
# 保留 XSRF 防護(enableCORS 預設 true,與 XSRF 相容);
# 不要設 enableCORS = false,會與 XSRF 衝突 → Streamlit 印 warning。
enableXsrfProtection = true

[browser]
gatherUsageStats = false

[theme]
# 台股慣例:紅漲綠跌
primaryColor = "#d62728"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F0F2F6"
textColor = "#262730"
font = "sans serif"
